services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: kanban-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-kanban_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-super-secret-key}
      - PORT=3001
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kanban-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend

  postgres:
    image: postgres:15
    container_name: kanban-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-kanban_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kanban-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
